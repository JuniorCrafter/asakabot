name: AsakaBot CI

# Запускать скрипт при каждом пуше в ветку main или master
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Клонируем код из репозитория
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Устанавливаем язык Go
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.x' # Используем актуальную версию, как в Вашем Docker

    # 3. Скачиваем библиотеки
    - name: Download Dependencies
      run: go mod download

    # 4. Проверяем код на синтаксические ошибки (Go Vet)
    - name: Run Go Vet
      run: go vet ./...

    # 5. Пробуем скомпилировать бота
    - name: Build Bot
      run: go build -o bot ./cmd/bot/main.go